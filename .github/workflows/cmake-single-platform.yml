name: CMake Windows Build

on:
  push:
    branches: [ "main", "master", "release" ]
  pull_request:
    branches: [ "main", "master", "release" ]

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2 and binutils
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-binutils

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build solution
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} -- /m

      - name: List build outputs
        run: |
          Get-ChildItem -Path build -Recurse | Select-Object FullName | Write-Output
