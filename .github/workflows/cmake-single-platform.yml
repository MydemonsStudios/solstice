name: CMake Windows Build

on:
  push:
    branches: [ "main", "master", "release" ]
  pull_request:
    branches: [ "main", "master", "release" ]

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Install MSYS2 and binutils
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-binutils

      - name: Add MSYS2 mingw64 bin to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          $env:MSYSTEM = ""
          # Find vcvars64.bat regardless of VS edition (Enterprise/Professional/Community/BuildTools)
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Write-Host "VS installation found at: $vsPath"
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          Write-Host "vcvars64 path: $vcvars"
          # Run vcvars64 and capture env, then apply to current process
          $envVars = cmd /c "`"$vcvars`" && set" | Where-Object { $_ -match "^[^=]+=.*" }
          foreach ($line in $envVars) {
            $name, $value = $line.Split("=", 2)
            [System.Environment]::SetEnvironmentVariable($name, $value)
          }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE

      - name: Build solution
        shell: pwsh
        run: |
          $env:MSYSTEM = ""
          cmake --build build --config $env:BUILD_TYPE -- /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solstice-dll
          path: build\Release\*.dll
