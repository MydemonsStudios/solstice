name: CMake Windows Build

on:
  push:
    branches: [ "main", "master", "release" ]
  pull_request:
    branches: [ "main", "master", "release" ]

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Install MSYS2 and binutils
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-binutils

      - name: Add MSYS2 mingw64 bin to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          # Find vcvars and capture its env into a temp script
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Write-Host "VS path: $vsPath"
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"

          # Write a cmd script that: unsets MSYSTEM, runs vcvars, then runs cmake
          # This runs in a totally clean cmd process with no MSYSTEM inheritance
          $script = @"
SET MSYSTEM=
CALL "$vcvars"
cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE
EXIT /B %ERRORLEVEL%
"@
          $scriptPath = "$env:TEMP\configure.cmd"
          $script | Set-Content -Path $scriptPath -Encoding ASCII

          # Start a brand new cmd.exe process (not inheriting pwsh env vars)
          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/D", "/C", $scriptPath `
            -WorkingDirectory $PWD `
            -NoNewWindow `
            -PassThru `
            -Wait
          exit $proc.ExitCode

      - name: Build solution
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "cmd.exe" `
            -ArgumentList "/D", "/C", "SET MSYSTEM= && cmake --build build --config $env:BUILD_TYPE -- /m" `
            -WorkingDirectory $PWD `
            -NoNewWindow `
            -PassThru `
            -Wait
          exit $proc.ExitCode

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solstice-dll
          path: |
            build\Release\*.dll
