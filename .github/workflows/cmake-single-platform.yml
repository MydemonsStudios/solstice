name: CMake Windows Build

on:
  push:
    branches: [ "main", "master", "release" ]
  pull_request:
    branches: [ "main", "master", "release" ]

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2 and binutils
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-binutils

      - name: Configure Visual Studio environment
        shell: cmd
        run: |
          FOR /F "usebackq delims=" %%i IN (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) DO set "VSINSTALLDIR=%%i"
          call "%VSINSTALLDIR%\VC\Auxiliary\Build\vcvarsall.bat" x64

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=%BUILD_TYPE%

      - name: Build solution
        shell: cmd
        run: |
          cmake --build build --config %BUILD_TYPE% -- /m

      - name: List build outputs
        run: |
          Get-ChildItem -Path build -Recurse | Select-Object FullName | Write-Output
