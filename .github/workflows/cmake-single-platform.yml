name: CMake Windows Build

on:
  push:
    branches: [ "main", "master", "release" ]
  pull_request:
    branches: [ "main", "master", "release" ]

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v2

      - name: Install MSYS2 and binutils
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-binutils

      - name: Add MSYS2 mingw64 bin to PATH
        shell: pwsh
        run: |
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        shell: cmd
        run: |
          set MSYSTEM=
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=%BUILD_TYPE%

      - name: Build solution
        shell: cmd
        run: |
          set MSYSTEM=
          cmake --build build --config %BUILD_TYPE% -- /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solstice-dll
          path: build\Release\*.dll
